name: Daily Import OMPP

on:
  schedule:
    - cron: "0 9 * * *"  # 6:00 AM Paraguay (UTC-3)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway Import
        run: |
          curl -fsS "https://adorable-blessing-production.up.railway.app/jobs/import_daily?token=${{ secrets.JOB_TOKEN }}"
