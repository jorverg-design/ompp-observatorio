<!doctype html><html lang="es"><head>
<meta charset="utf-8"><title>OMPP — Carga diaria</title>
<link rel="stylesheet" href="/static/style.css"></head><body>
<div class="container">
<h1>Carga diaria — Canasta + Carne + Movilidad</h1>
<p class="muted">Fecha = día de observación. Podés dejar campos en blanco.</p>
<form id="f" action="/carga" method="post">
<div class="row"><label>Semana (lunes):</label><input name="week_date" type="date" required></div>
<div class="row"><label>Geo:</label><input name="geo" type="text" value="AMA"></div>
<div class="row"><label>Fuente:</label><input name="source" type="text" value="Relevamiento"></div>
<h2>Productos</h2>
<table><thead><tr><th>Código</th><th>Producto</th><th>Unidad</th><th>Valor</th></tr></thead><tbody>
{% for code,name,cat,unit in products %}
<tr><td class="muted">{{ code }}</td><td>{{ name }}</td><td class="muted">{{ unit }}</td>
<td><input type="number" step="0.01" data-code="{{ code }}" class="val"></td></tr>
{% endfor %}
</tbody></table>
<input type="hidden" name="data_json" id="data_json">
<div class="actions"><button class="btn" type="submit">Guardar</button><a class="btn secondary" href="/">Volver</a></div>
</form></div>
<script>
document.getElementById("f").addEventListener("submit", function(){
  const out = {};
  document.querySelectorAll("input.val").forEach(inp => { if(inp.value!=="") out[inp.dataset.code]=parseFloat(inp.value); });
  document.getElementById("data_json").value = JSON.stringify(out);
});
</script></body></html>
